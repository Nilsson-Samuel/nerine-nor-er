stages:
  - test

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

default:
  image: python:3.12-slim
  cache:
    key:
      files:
        - requirements-ci.txt
    paths:
      - .cache/pip

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONPATH: "$CI_PROJECT_DIR:$CI_PROJECT_DIR/src"

unit_tests:
  stage: test
  before_script:
    - python -V
    - python -m pip install -r requirements-ci.txt
  script:
    - python -m pytest tests -q --junitxml=report.xml
  artifacts:
    when: always
    reports:
      junit: report.xml
